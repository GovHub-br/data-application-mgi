name: data-application-minc

# Base configuration for Airflow services
x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: infra/docker/airflow/Dockerfile
    target: ${AIRFLOW_BUILD_TARGET:-airflow-dev}
    args:
      AIRFLOW_VERSION: ${AIRFLOW_VERSION:-2.8.1}
      PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - ../.env
  volumes:
    - ./airflow/airflow.cfg:/opt/airflow/airflow.cfg
    - ../dags:/opt/airflow/dags/
    - ../plugins:/opt/airflow/plugins/
    - ../helpers:/opt/airflow/helpers/
    - ../templates:/opt/airflow/templates/
    - ../dbt:/opt/airflow/dbt/
    - ../dbt/ipea/profiles.yml:/opt/airflow/.dbt/profiles.yml
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

# Common environment variables for Airflow
x-airflow-environment: &airflow-common-env
  AIRFLOW__CORE__DEFAULT_TIMEZONE: 'America/Sao_Paulo'
  AIRFLOW__CORE__ENABLE_XCOM_PICKLING: 'true'
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__CORE__TEST_CONNECTION: Enabled
  AIRFLOW__CORE__MAX_MAP_LENGTH: 15000
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres/airflow
  AIRFLOW__EMAIL__DEFAULT_EMAIL_ON_RETRY: 'false'
  AIRFLOW__EMAIL__DEFAULT_EMAIL_ON_FAILURE: 'false'
  AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: 'America/Sao_Paulo'
  AIRFLOW__WEBSERVER__INSTANCE_NAME: "Ipea - Local Dev!"
  AIRFLOW__WEBSERVER__NAVBAR_COLOR: '#98DFFF'
  AIRFLOW__WEBSERVER__RELOAD_ON_PLUGIN_CHANGE: 'true'
  AIRFLOW__WEBSERVER__SECRET_KEY: '42'
  PYTHONPATH: "/opt/airflow/dags:/opt/airflow/plugins:/opt/airflow/helpers"
  _AIRFLOW_DB_MIGRATE: 'true'
  _AIRFLOW_WWW_USER_CREATE: 'true'
  _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
  _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
  AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW_REPO_BASE: /opt/airflow
  # A ENV AIRFLOW_REPO_BASE É IMPORTANTE PARA SINCRONIZAR COM O SISTEMA DE PASTAS
  # DO AIRFLOW EM HOMOLOG E PROD, ELES POSSUEM UMA ESTRUTURA DE PASTAS DIFERENTE
  # USAR ESSA ENV NOS CÓDIGOS PARA NÃO HAVER CONFLITOS
  
services:
  # Airflow Services
  airflow:
    <<: *airflow-common
    # Usamos o comando de standalone aqui para não rodar múltiplos containers
    # do airflow localmente e assim melhorar a velocidade inicialização
    # doc do standalone: https://airflow.apache.org/docs/apache-airflow/2.8.1/start.html
    command: standalone
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 60s
      start_period: 60s
      retries: 5
    restart: always
    environment:
      <<: *airflow-common-env

  # Postgres database
  postgres:
    image: postgres:15-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-db:/var/lib/postgresql/data
      - ./docker/postgres/:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-mcp:
    build:
      context: ..
      dockerfile: infra/docker/airflow-mcp/Dockerfile
    profiles:
      - dev
    environment:
      AIRFLOW_API_URL: http://airflow:8080
      AIRFLOW_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      AIRFLOW_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      AF_READ_ONLY: ${AF_READ_ONLY:-false}
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      airflow:
        condition: service_healthy
    restart: always

volumes:
  postgres-db:
