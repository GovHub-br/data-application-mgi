name: data-application-mgi

# Base configuration for Airflow services
x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: infra/docker/airflow/Dockerfile
    target: ${AIRFLOW_BUILD_TARGET:-airflow-dev}
    args:
      AIRFLOW_VERSION: ${AIRFLOW_VERSION:-3.2.2}
      PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - ../.env
  volumes:
    - ./airflow/airflow.cfg:/opt/airflow/airflow.cfg
    - ./airflow/prune_stale_dags.py:/opt/airflow/prune_stale_dags.py:ro
    - ../dags:/opt/airflow/dags/
    - ../plugins:/opt/airflow/plugins/
    - ../helpers:/opt/airflow/helpers/
    - ../templates:/opt/airflow/templates/
    - ../dbt:/opt/airflow/dbt/
    - ../dbt/mgi/profiles.yml:/opt/airflow/.dbt/profiles.yml
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

# Common environment variables for Airflow
x-airflow-environment: &airflow-common-env
  AIRFLOW__CORE__DEFAULT_TIMEZONE: 'America/Sao_Paulo'
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__CORE__TEST_CONNECTION: Enabled
  AIRFLOW__CORE__MAX_MAP_LENGTH: 15000
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: airflow:admin
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres/airflow
  AIRFLOW__EMAIL__DEFAULT_EMAIL_ON_RETRY: 'false'
  AIRFLOW__EMAIL__DEFAULT_EMAIL_ON_FAILURE: 'false'
  AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: 'America/Sao_Paulo'
  AIRFLOW__WEBSERVER__INSTANCE_NAME: "Ipea - Local Dev!"
  AIRFLOW__WEBSERVER__NAVBAR_COLOR: '#112130'
  AIRFLOW__WEBSERVER__RELOAD_ON_PLUGIN_CHANGE: 'true'
  AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:-local-dev-airflow-secret-key}
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-local-dev-airflow-jwt-secret}
  PYTHONPATH: "/opt/airflow/dags:/opt/airflow/plugins:/opt/airflow/helpers"
  _AIRFLOW_DB_MIGRATE: 'true'
  AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW_REPO_BASE: /opt/airflow
  AIRFLOW_PRUNE_STALE_DAGS: ${AIRFLOW_PRUNE_STALE_DAGS:-true}
  # A ENV AIRFLOW_REPO_BASE É IMPORTANTE PARA SINCRONIZAR COM O SISTEMA DE PASTAS
  # DO AIRFLOW EM HOMOLOG E PROD, ELES POSSUEM UMA ESTRUTURA DE PASTAS DIFERENTE
  # USAR ESSA ENV NOS CÓDIGOS PARA NÃO HAVER CONFLITOS
  
services:
  # Airflow Services
  airflow:
    <<: *airflow-common
    # Usamos standalone para não rodar múltiplos containers localmente.
    # A poda automática remove DAGs órfãs do metadata DB quando arquivos são apagados.
    command:
      - bash
      - -c
      - |
        set -euo pipefail

        airflow standalone &
        airflow_pid=$$!

        trap 'kill -TERM "$$airflow_pid" 2>/dev/null || true; wait "$$airflow_pid" 2>/dev/null || true' TERM INT

        if [[ "${AIRFLOW_PRUNE_STALE_DAGS:-true}" == "true" ]]; then
          for _ in {1..60}; do
            if ! kill -0 "$$airflow_pid" 2>/dev/null; then
              wait "$$airflow_pid"
              exit $?
            fi

            if curl --fail --silent http://localhost:8080/api/v2/monitor/health >/dev/null; then
              python /opt/airflow/prune_stale_dags.py || true
              break
            fi

            sleep 2
          done
        fi

        wait "$$airflow_pid"
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health" ]
      interval: 10s
      timeout: 60s
      start_period: 60s
      retries: 5
    restart: always
    environment:
      <<: *airflow-common-env

  postgres:
    image: postgres:15-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-db:/var/lib/postgresql/data
      - ./docker/postgres/:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  airflow-mcp:
    build:
      context: ..
      dockerfile: infra/docker/airflow-mcp/Dockerfile
    profiles:
      - dev
    environment:
      AIRFLOW_API_URL: http://airflow:8080
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      AF_READ_ONLY: ${AF_READ_ONLY:-false}
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      airflow:
        condition: service_healthy
    restart: always

  superset:
    build:
      context: ..
      dockerfile: infra/docker/superset/Dockerfile
    environment:
      SUPERSET_SECRET_KEY: 'supersetadmin'
      SUPERSET_ENV: development
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/superset
    ports:
      - "8088:8088"
    depends_on:
      - postgres
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      /bin/sh -c "
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password admin &&
      superset db upgrade &&
      superset init &&
      superset run -p 8088 -h 0.0.0.0 --with-threads --reload --debugger
      "

  minio:
    image: minio/minio:RELEASE.2023-06-19T19-52-50Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mc alias set local http://127.0.0.1:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} >/dev/null && mc ready local",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Creates the landing zone bucket on first start
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/$${RAW_STORAGE_CONTAINER:-data-lake-ipea} &&
      echo 'Bucket ready.'
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      RAW_STORAGE_CONTAINER: ${RAW_STORAGE_CONTAINER:-data-lake-ipea}
      MINIO_BUCKET: ${MINIO_BUCKET:-${RAW_STORAGE_CONTAINER:-data-lake-ipea}}

volumes:
  postgres-db:
  minio-data:
